"Fish Logger System is a boat-optimized fishing log designed for extremely fast and reliable catch entry with minimal user interaction. The system follows a “fast logging first” principle: the user only inputs essential data, while all possible information (timestamp, GPS, boat telemetry) is attached automatically.

Version 1 is intentionally simple. It functions purely as a structured fishing diary without analytics, optimization, or smart recommendations. The goal is to ensure that data capture is fast, consistent, and reliable in real-world conditions (on a boat, with gloves, offline).

Core design principles:

logging must take only seconds
minimal required input
data structure must be extensible without future refactoring
Fish Logger System — Cursor Spec (V1)
1. Goal
Fast fishing log for boat usage
Catch entry in seconds
Offline-first
No analytics or optimization
No extra features beyond core functionality
2. Core Rules
Only one active session at a time
No catch logging without an active session (V1)
Same angler cannot be active in multiple sessions simultaneously
timestamp is never null
length and weight:
null or positive integer
never 0
3. Data Model (V1)
Session
Session {
  id
  startTime
  endTime
}
Angler
Angler {
  id
  displayName
}
SessionAngler
SessionAngler {
  sessionId
  anglerId
  isActive
  joinedAt
  leftAt
}
CatchRecord
CatchRecord {
  id
  sessionId: string | null
  anglerId
  timestamp

  species
  length
  weight
  notes

  gps {
    lat
    lon
  }

  telemetry {
    depth
    waterTemp
  }
}
4. Validation Rules
species is required
anglerId is required
timestamp is required
if sessionId != null:
anglerId must belong to that session
5. Session Flow
Start
user selects at least one angler
user can add a new angler (name input)
During session
can:
add angler
mark angler inactive (isActive = false)
no deletion of historical data
End
set endTime
no further catches can be added to the session
6. Fish Entry Flow
Screen 1: Select Angler
choose from active session anglers
Screen 2: Catch Data
Species (required):
pike
perch
zander
trout
other
Length (cm): numeric input, optional
Weight (g): numeric input, optional
Shared numeric keypad
No OK button
Next enabled only when species selected
Screen 3: Notes
optional
Save
Screen 4: Confirmation
“Catch saved”
options:
Add new catch
Back
7. Automatic Data

If available:

timestamp
gps.lat
gps.lon
telemetry.depth
telemetry.waterTemp
8. Fast Logging
angler + species → save
all other fields optional
9. UI Principles
large buttons
no dropdowns
no mandatory text input
minimal number of screens
10. To Implement in V1
Data model
Session manager (single active session)
Session angler management
Fish entry flow (4 screens)
CatchRecord creation
Local storage (SQLite or IndexedDB)
11. Not Included in V1
analytics
CPUE
heatmap
replay
map view
offline maps
AI recognition
pattern detection
recommendations
lure logic
auto-suggestions
multi-user sync
chat
live session
weather data
quick tags
spots"